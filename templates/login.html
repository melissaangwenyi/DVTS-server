<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Tracking System — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1A1A2E;
            color: #EAEAEA;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #16213E;
            border: 1px solid #2A2A4A;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 20px;
            color: #E94560;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .logo p {
            font-size: 13px;
            color: #A0A0B0;
        }

        label {
            display: block;
            font-size: 13px;
            color: #A0A0B0;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #0F3460;
            border: 1px solid #2A2A4A;
            border-radius: 6px;
            color: #EAEAEA;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #E94560;
        }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #E94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        button[type="submit"]:hover {
            background: #C73652;
        }

        .error {
            background: #4A0A0A;
            color: #FF6B6B;
            border: 1px solid #E74C3C;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        footer {
            margin-top: 32px;
            font-size: 12px;
            color: #A0A0B0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h1>🛡 VISITOR TRACKING SYSTEM</h1>
        <p>University of Nairobi — Authorized Access Only</p>
    </div>

    {% if error %}
    <div class="error">⛔ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">🔓 LOGIN</button>
    </form>
</div>

<footer>
    Angwenyi Melissa Moraa — SCS3/149260/2024 · University of Nairobi
</footer>

</body>
</html>
